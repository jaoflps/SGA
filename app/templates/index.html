<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Bem-vindo</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1d976c; --secondary: #93f9b9; }
        body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; }
        
        .bg-animated {
            background: linear-gradient(-45deg, #1d976c, #116648, #2c3e50, #147a57);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100%; display: flex; align-items: center; justify-content: center;
        }

        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 60px; border-radius: 40px; text-align: center;
            max-width: 550px; color: white; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .btn-glow {
            background: var(--secondary); color: #116648 !important;
            border-radius: 50px; padding: 15px 40px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.4s;
            border: none; box-shadow: 0 10px 20px rgba(147, 249, 185, 0.3);
        }

        .btn-glow:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--secondary); }
        .logo-icon { font-size: 5rem; margin-bottom: 25px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
    </style>
</head>
<body>
    <div class="bg-animated">
        <div class="glass-card">
            <i class="fas fa-university logo-icon"></i>
            <h1 class="display-4 font-weight-bold">SGA</h1>
            <p class="lead" style="opacity: 0.9;">Sistema de Gestão de Alojamento</p>
            <hr style="border-top: 1px solid rgba(255,255,255,0.2);">
            <p class="mb-5">Sua moradia acadêmica na palma da sua mão.</p>
            <a href="{% url 'login' %}" class="btn btn-glow btn-lg">
                <i class="fas fa-rocket mr-2"></i> Começar Agora
            </a>
            <div class="mt-5 small" style="opacity: 0.6;">Versão 2.0 - 2026</div>
        </div>
    </div>
</body>
</html>
